name: Scheduled IMAP Poll

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 minutes
  workflow_dispatch: {}

jobs:
  poll-runner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: |
          npm ci

      - name: Run IMAP poller on runner
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://jrrbgydyhangvyyqrfdt.supabase.co
          SUPABASE_URL: https://jrrbgydyhangvyyqrfdt.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          IMAP_ALLOW_INSECURE_TLS: ${{ secrets.IMAP_ALLOW_INSECURE_TLS }}
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
          IMAP_PORT: ${{ secrets.IMAP_PORT }}
          IMAP_MAILBOX: ${{ secrets.IMAP_MAILBOX }}
          IMAP_FILTER_FROM: ${{ secrets.IMAP_FILTER_FROM }}
          LOOKBACK_DAYS: ${{ secrets.IMAP_LOOKBACK_DAYS }}
        run: |
          set -euo pipefail
          echo "Env presence (masked):"
          if [ -n "${NEXT_PUBLIC_SUPABASE_URL:-}" ]; then echo "NEXT_PUBLIC_SUPABASE_URL: set"; else echo "NEXT_PUBLIC_SUPABASE_URL: missing"; fi
          if [ -n "${SUPABASE_URL:-}" ]; then echo "SUPABASE_URL: set"; else echo "SUPABASE_URL: missing"; fi
          if [ -n "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then echo "SUPABASE_SERVICE_ROLE_KEY: set"; else echo "SUPABASE_SERVICE_ROLE_KEY: missing"; fi
          if [ -n "${NEXT_PUBLIC_SUPABASE_SERVICE_ROLE_KEY:-}" ]; then echo "NEXT_PUBLIC_SUPABASE_SERVICE_ROLE_KEY: set"; else echo "NEXT_PUBLIC_SUPABASE_SERVICE_ROLE_KEY: missing"; fi
          if [ -n "${IMAP_ALLOW_INSECURE_TLS:-}" ]; then echo "IMAP_ALLOW_INSECURE_TLS: ${IMAP_ALLOW_INSECURE_TLS}"; else echo "IMAP_ALLOW_INSECURE_TLS: not set"; fi
          echo "Running scripts/imapPoller.js on Actions runner"
          node scripts/imapPoller.js
